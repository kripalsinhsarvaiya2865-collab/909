<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Call Recorder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2235;
    --accent: #00e5ff;
    --accent2: #ff4081;
    --green: #00e676;
    --yellow: #ffea00;
    --text: #e8eaf6;
    --muted: #7986cb;
    --border: rgba(0,229,255,0.15);
    --glow: 0 0 20px rgba(0,229,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,64,129,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 480px; margin: auto; padding: 0 12px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #111827, #1a2235);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: var(--glow);
    text-transform: uppercase;
  }
  .header p { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 68px;
    background: #111827;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 10px;
    font-family: 'Exo 2', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .nav-btn span { font-size: 24px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active span { filter: drop-shadow(0 0 6px var(--accent)); }

  /* Sections */
  .section { display: none; padding-top: 16px; }
  .section.active { display: block; }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== RECORDER SECTION ===== */
  .recorder-visual {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  .record-btn-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .pulse-ring {
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid var(--accent2);
    opacity: 0;
    animation: none;
  }
  .pulse-ring.active {
    animation: pulseRing 1.5s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.5s; }

  @keyframes pulseRing {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .record-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--accent2);
    background: radial-gradient(circle, #2a1020, #1a0810);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(255,64,129,0.3);
    position: relative;
    z-index: 1;
  }
  .record-btn:active { transform: scale(0.93); }
  .record-btn.recording {
    border-color: var(--accent2);
    background: radial-gradient(circle, #3a0820, #200a14);
    box-shadow: 0 0 30px rgba(255,64,129,0.6);
    animation: recordPulse 1s ease-in-out infinite;
  }
  @keyframes recordPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,64,129,0.4); }
    50% { box-shadow: 0 0 40px rgba(255,64,129,0.8); }
  }

  .record-status {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .record-status.active { color: var(--accent2); text-shadow: 0 0 10px rgba(255,64,129,0.5); }

  .record-timer {
    font-family: 'Rajdhani', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  /* Waveform */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 20px;
  }
  .wave-bar {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
    height: 8px;
    opacity: 0.4;
    transition: height 0.1s;
  }
  .wave-bar.active {
    opacity: 1;
    animation: waveAnim 0.8s ease-in-out infinite;
  }
  .wave-bar:nth-child(1)  { animation-delay: 0.0s; }
  .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { animation-delay: 0.3s; }
  .wave-bar:nth-child(5)  { animation-delay: 0.15s; }
  .wave-bar:nth-child(6)  { animation-delay: 0.25s; }
  .wave-bar:nth-child(7)  { animation-delay: 0.35s; }
  .wave-bar:nth-child(8)  { animation-delay: 0.05s; }
  .wave-bar:nth-child(9)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(10) { animation-delay: 0.4s; }
  .wave-bar:nth-child(11) { animation-delay: 0.1s; }
  .wave-bar:nth-child(12) { animation-delay: 0.3s; }

  @keyframes waveAnim {
    0%, 100% { height: 6px; }
    50% { height: 32px; }
  }

  .rec-controls { display: flex; gap: 12px; width: 100%; }
  .rec-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .rec-btn:active { transform: scale(0.96); }
  .rec-btn-record { background: var(--accent2); color: white; box-shadow: 0 4px 15px rgba(255,64,129,0.3); }
  .rec-btn-stop   { background: #263238; color: var(--muted); border: 1px solid var(--border); }
  .rec-btn-stop.ready { background: #1a2a1a; color: var(--green); border-color: var(--green); box-shadow: 0 0 10px rgba(0,230,118,0.2); }

  /* Label input */
  .label-input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border 0.2s;
  }
  .label-input:focus { border-color: var(--accent); }
  .label-input::placeholder { color: var(--muted); }

  /* Recordings list */
  .rec-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .rec-item:active { border-color: var(--accent); }

  .rec-item-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(0,229,255,0.1);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .rec-item-info { flex: 1; min-width: 0; }
  .rec-item-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rec-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .rec-item-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.play  { color: var(--green); border-color: var(--green); }
  .icon-btn.pause { color: var(--yellow); border-color: var(--yellow); }
  .icon-btn.del   { color: var(--accent2); border-color: var(--accent2); }

  /* Audio player mini */
  .mini-player {
    margin-top: 8px;
    display: none;
  }
  .mini-player.show { display: block; }
  .mini-player audio { width: 100%; height: 36px; filter: invert(1) hue-rotate(180deg) saturate(0.5); }

  /* ===== CALL LOG SECTION ===== */
  .form-group { margin-bottom: 12px; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-input::placeholder, .form-textarea::placeholder { color: #455a64; }
  .form-select option { background: #1a2235; }
  .form-textarea { resize: none; height: 70px; }

  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #0097a7);
    border: none;
    border-radius: 12px;
    color: #0a0e1a;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(0,229,255,0.3);
  }
  .submit-btn:active { transform: scale(0.97); opacity: 0.9; }

  /* Call log list */
  .call-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    position: relative;
  }

  .call-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .call-icon.incoming  { background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.3); }
  .call-icon.outgoing  { background: rgba(0,229,255,0.12); border: 1px solid rgba(0,229,255,0.3); }
  .call-icon.missed    { background: rgba(255,64,129,0.12); border: 1px solid rgba(255,64,129,0.3); }

  .call-info { flex: 1; min-width: 0; }
  .call-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .call-number { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .call-meta { font-size: 11px; color: #546e7a; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .call-note { font-size: 12px; color: #7986cb; margin-top: 5px; font-style: italic; }

  .call-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-incoming { background: rgba(0,230,118,0.2); color: var(--green); }
  .badge-outgoing { background: rgba(0,229,255,0.15); color: var(--accent); }
  .badge-missed   { background: rgba(255,64,129,0.2); color: var(--accent2); }

  .call-del-btn {
    background: none;
    border: none;
    color: #455a64;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }
  .call-del-btn:active { color: var(--accent2); }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
  }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .stat-box.s1 .stat-num { color: var(--green); }
  .stat-box.s2 .stat-num { color: var(--accent); }
  .stat-box.s3 .stat-num { color: var(--accent2); }

  /* Search */
  .search-input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 38px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .empty-state div { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 30px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: var(--glow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>📞 CallRec Pro</h1>
  <p>VOICE RECORDER &amp; CALL LOG TRACKER</p>
</div>

<div class="container">

  <!-- ===== RECORDER ===== -->
  <div id="sec-recorder" class="section active">

    <div class="card">
      <div class="card-title">🎙️ Voice Recorder</div>

      <input class="label-input" id="recLabel" placeholder="Recording label / call name...">

      <div class="recorder-visual">
        <div class="record-btn-wrap">
          <div class="pulse-ring" id="pr1"></div>
          <div class="pulse-ring" id="pr2"></div>
          <button class="record-btn" id="recBtn" onclick="toggleRecord()">🎙️</button>
        </div>

        <div class="record-status" id="recStatus">READY</div>
        <div class="record-timer" id="recTimer">00:00</div>

        <div class="waveform" id="waveform">
          <div class="wave-bar" id="wb1"></div>
          <div class="wave-bar" id="wb2"></div>
          <div class="wave-bar" id="wb3"></div>
          <div class="wave-bar" id="wb4"></div>
          <div class="wave-bar" id="wb5"></div>
          <div class="wave-bar" id="wb6"></div>
          <div class="wave-bar" id="wb7"></div>
          <div class="wave-bar" id="wb8"></div>
          <div class="wave-bar" id="wb9"></div>
          <div class="wave-bar" id="wb10"></div>
          <div class="wave-bar" id="wb11"></div>
          <div class="wave-bar" id="wb12"></div>
        </div>

        <div class="rec-controls">
          <button class="rec-btn rec-btn-record" id="btnStart" onclick="toggleRecord()">⏺ START</button>
          <button class="rec-btn rec-btn-stop" id="btnStop" onclick="stopRecord()" disabled>⏹ SAVE</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🗂️ Saved Recordings <span style="font-size:12px;color:var(--muted);font-family:'Exo 2'" id="recCount"></span></div>
      <div id="recList"><div class="empty-state"><div>🎙️</div>No recordings yet.<br>Tap START to begin.</div></div>
    </div>

  </div>

  <!-- ===== CALL LOG ===== -->
  <div id="sec-calllog" class="section">

    <div class="stats-row">
      <div class="stat-box s1"><div class="stat-num" id="statIn">0</div><div class="stat-label">Incoming</div></div>
      <div class="stat-box s2"><div class="stat-num" id="statOut">0</div><div class="stat-label">Outgoing</div></div>
      <div class="stat-box s3"><div class="stat-num" id="statMiss">0</div><div class="stat-label">Missed</div></div>
    </div>

    <div class="card">
      <div class="card-title">➕ Add Call Log</div>

      <div class="row2">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" id="clName" placeholder="Contact name">
        </div>
        <div class="form-group">
          <label class="form-label">Number</label>
          <input class="form-input" id="clNumber" placeholder="Phone no." type="tel">
        </div>
      </div>

      <div class="row2">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="clType">
            <option value="incoming">📥 Incoming</option>
            <option value="outgoing">📤 Outgoing</option>
            <option value="missed">❌ Missed</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Duration</label>
          <input class="form-input" id="clDuration" placeholder="e.g. 5m 30s">
        </div>
      </div>

      <div class="row2">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" id="clDate" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Time</label>
          <input class="form-input" id="clTime" type="time">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="clNote" placeholder="Call topic, important points..."></textarea>
      </div>

      <button class="submit-btn" onclick="addCallLog()">✚ ADD TO LOG</button>
    </div>

    <div class="card">
      <div class="card-title">📋 Call History</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search name or number..." oninput="renderCallLog()">
      </div>
      <div id="callLogList"><div class="empty-state"><div>📞</div>No calls logged yet.</div></div>
    </div>

  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showTab('recorder',this)"><span>🎙️</span>Recorder</button>
  <button class="nav-btn" onclick="showTab('calllog',this)"><span>📋</span>Call Log</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // ========== TAB SWITCH ==========
  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sec-' + id).classList.add('active');
    btn.classList.add('active');
  }

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = color || 'var(--accent)';
    t.style.color = color || 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ========== RECORDER ==========
  let mediaRecorder = null;
  let audioChunks   = [];
  let recordings    = JSON.parse(localStorage.getItem('callrec_recordings') || '[]');
  let timerInterval = null;
  let timerSeconds  = 0;
  let isRecording   = false;
  let currentPlayId = null;

  function fmtTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2,'0');
    const sec = (s % 60).toString().padStart(2,'0');
    return `${m}:${sec}`;
  }

  function updateTimer() {
    timerSeconds++;
    document.getElementById('recTimer').textContent = fmtTime(timerSeconds);
  }

  async function toggleRecord() {
    if (isRecording) { stopRecord(); return; }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url  = URL.createObjectURL(blob);
        const label = document.getElementById('recLabel').value.trim() || `Recording ${recordings.length + 1}`;
        const now  = new Date();
        const entry = {
          id:    Date.now(),
          label,
          date:  now.toLocaleDateString('en-IN'),
          time:  now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }),
          duration: fmtTime(timerSeconds),
          url,
          blob: null
        };

        // Store as base64
        const reader = new FileReader();
        reader.onload = () => {
          entry.blob = reader.result;
          recordings.unshift(entry);
          try { localStorage.setItem('callrec_recordings', JSON.stringify(recordings)); } catch(e) {}
          renderRecordings();
          showToast('✅ SAVED: ' + label, 'var(--green)');
        };
        reader.readAsDataURL(blob);

        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();
      isRecording = true;
      timerSeconds = 0;
      timerInterval = setInterval(updateTimer, 1000);

      document.getElementById('recBtn').classList.add('recording');
      document.getElementById('recBtn').textContent = '⏹';
      document.getElementById('recStatus').textContent = 'RECORDING';
      document.getElementById('recStatus').classList.add('active');
      document.getElementById('recTimer').textContent = '00:00';
      document.getElementById('btnStart').textContent = '⏹ STOP';
      document.getElementById('btnStop').disabled = false;
      document.getElementById('btnStop').classList.add('ready');
      document.getElementById('pr1').classList.add('active');
      document.getElementById('pr2').classList.add('active');

      // Animate wave bars
      document.querySelectorAll('.wave-bar').forEach(b => b.classList.add('active'));

    } catch(err) {
      showToast('❌ MIC ACCESS DENIED', 'var(--accent2)');
      alert('Microphone permission denied. Please allow mic access.');
    }
  }

  function stopRecord() {
    if (!isRecording || !mediaRecorder) return;
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(timerInterval);

    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('recBtn').textContent = '🎙️';
    document.getElementById('recStatus').textContent = 'READY';
    document.getElementById('recStatus').classList.remove('active');
    document.getElementById('btnStart').textContent = '⏺ START';
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnStop').classList.remove('ready');
    document.getElementById('pr1').classList.remove('active');
    document.getElementById('pr2').classList.remove('active');
    document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active'));
    document.getElementById('recLabel').value = '';
  }

  function renderRecordings() {
    const list = document.getElementById('recList');
    const count = document.getElementById('recCount');
    count.textContent = recordings.length ? `(${recordings.length})` : '';

    if (!recordings.length) {
      list.innerHTML = '<div class="empty-state"><div>🎙️</div>No recordings yet.<br>Tap START to begin.</div>';
      return;
    }

    list.innerHTML = recordings.map(r => `
      <div class="rec-item" id="ri-${r.id}">
        <div class="rec-item-icon">🎵</div>
        <div class="rec-item-info">
          <div class="rec-item-name">${r.label}</div>
          <div class="rec-item-meta">${r.date} ${r.time} &nbsp;•&nbsp; ⏱ ${r.duration}</div>
          <div class="mini-player" id="mp-${r.id}">
            <audio id="aud-${r.id}" src="${r.blob || r.url}" preload="none" controls></audio>
          </div>
        </div>
        <div class="rec-item-btns">
          <button class="icon-btn play" onclick="playRec(${r.id})" title="Play">▶</button>
          <button class="icon-btn del" onclick="deleteRec(${r.id})" title="Delete">🗑</button>
        </div>
      </div>`).join('');
  }

  function playRec(id) {
    const mp = document.getElementById('mp-' + id);
    if (mp.classList.contains('show')) {
      mp.classList.remove('show');
    } else {
      document.querySelectorAll('.mini-player').forEach(m => m.classList.remove('show'));
      mp.classList.add('show');
      setTimeout(() => document.getElementById('aud-' + id)?.play(), 100);
    }
  }

  function deleteRec(id) {
    if (!confirm('Delete this recording?')) return;
    recordings = recordings.filter(r => r.id !== id);
    try { localStorage.setItem('callrec_recordings', JSON.stringify(recordings)); } catch(e) {}
    renderRecordings();
    showToast('🗑 DELETED', 'var(--accent2)');
  }

  // ========== CALL LOG ==========
  let callLogs = JSON.parse(localStorage.getItem('callrec_logs') || '[]');

  // Set default date/time
  const now = new Date();
  document.getElementById('clDate').value = now.toISOString().split('T')[0];
  document.getElementById('clTime').value = now.toTimeString().slice(0,5);

  function addCallLog() {
    const name = document.getElementById('clName').value.trim();
    if (!name) { showToast('⚠ ENTER CONTACT NAME', 'var(--yellow)'); return; }

    const entry = {
      id:       Date.now(),
      name,
      number:   document.getElementById('clNumber').value.trim(),
      type:     document.getElementById('clType').value,
      duration: document.getElementById('clDuration').value.trim(),
      date:     document.getElementById('clDate').value,
      time:     document.getElementById('clTime').value,
      note:     document.getElementById('clNote').value.trim()
    };

    callLogs.unshift(entry);
    localStorage.setItem('callrec_logs', JSON.stringify(callLogs));

    // Reset
    document.getElementById('clName').value = '';
    document.getElementById('clNumber').value = '';
    document.getElementById('clDuration').value = '';
    document.getElementById('clNote').value = '';
    document.getElementById('clType').value = 'incoming';
    const n = new Date();
    document.getElementById('clDate').value = n.toISOString().split('T')[0];
    document.getElementById('clTime').value = n.toTimeString().slice(0,5);

    renderCallLog();
    showToast('✅ CALL LOGGED', 'var(--green)');
  }

  function deleteCallLog(id) {
    if (!confirm('Delete this call log?')) return;
    callLogs = callLogs.filter(c => c.id !== id);
    localStorage.setItem('callrec_logs', JSON.stringify(callLogs));
    renderCallLog();
    showToast('🗑 DELETED', 'var(--accent2)');
  }

  function renderCallLog() {
    const query = (document.getElementById('searchInput').value || '').toLowerCase();
    let filtered = callLogs.filter(c =>
      c.name.toLowerCase().includes(query) ||
      (c.number || '').includes(query)
    );

    // Stats (full, not filtered)
    document.getElementById('statIn').textContent   = callLogs.filter(c => c.type==='incoming').length;
    document.getElementById('statOut').textContent  = callLogs.filter(c => c.type==='outgoing').length;
    document.getElementById('statMiss').textContent = callLogs.filter(c => c.type==='missed').length;

    const list = document.getElementById('callLogList');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div>📞</div>${query ? 'No results found.' : 'No calls logged yet.'}</div>`;
      return;
    }

    const icons   = { incoming:'📥', outgoing:'📤', missed:'❌' };
    const badges  = { incoming:'badge-incoming', outgoing:'badge-outgoing', missed:'badge-missed' };
    const labels  = { incoming:'Incoming', outgoing:'Outgoing', missed:'Missed' };

    list.innerHTML = filtered.map(c => {
      const dateStr = c.date ? new Date(c.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '';
      return `
        <div class="call-item">
          <div class="call-icon ${c.type}">${icons[c.type]}</div>
          <div class="call-info">
            <div class="call-name">${c.name}</div>
            ${c.number ? `<div class="call-number">📱 ${c.number}</div>` : ''}
            <div class="call-meta">
              <span class="call-badge ${badges[c.type]}">${labels[c.type]}</span>
              ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
              ${c.time ? `<span>🕐 ${c.time}</span>` : ''}
              ${c.duration ? `<span>⏱ ${c.duration}</span>` : ''}
            </div>
            ${c.note ? `<div class="call-note">💬 ${c.note}</div>` : ''}
          </div>
          <button class="call-del-btn" onclick="deleteCallLog(${c.id})">✕</button>
        </div>`;
    }).join('');
  }

  // Init
  renderRecordings();
  renderCallLog();
</script>
</body>
</html>
